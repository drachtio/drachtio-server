name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtool libtool-bin libcurl4-openssl-dev libunwind-dev libgoogle-perftools-dev sip-tester
      - name: build drachtio
        run: |
          ./autogen.sh
          mkdir -p build && cd $_
          ../configure --enable-tcmalloc=yes
          make
          sudo make install
      - name: install nodejs 
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run ci tests
        run: |
          cd test
          npm install 
          npm run test-ci
          cat /tmp/drachtio.log
